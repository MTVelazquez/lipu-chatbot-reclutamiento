<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reclutamiento Lipu Monterrey</title>
  <link rel="stylesheet" href="css/chat.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="chat-container">
    <!-- Header -->
    <header id="chat-header">
      <div class="header-avatar">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <circle cx="20" cy="20" r="20" fill="#128C7E"/>
          <text x="20" y="26" text-anchor="middle" fill="white" font-size="18" font-weight="bold">L</text>
        </svg>
      </div>
      <div class="header-info">
        <h1>Reclutamiento Lipu Monterrey</h1>
        <p id="header-status">En linea</p>
      </div>
    </header>

    <!-- Chat area -->
    <main id="chat-messages">
      <div class="date-separator"><span>Hoy</span></div>
    </main>

    <!-- Typing indicator -->
    <div id="typing-indicator" class="hidden">
      <div class="typing-bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Quick reply buttons area -->
    <div id="quick-replies" class="hidden"></div>

    <!-- Text input area -->
    <footer id="input-area" class="hidden">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Escribe tu respuesta..." autocomplete="off">
        <button id="send-btn" aria-label="Enviar">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="white" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>

    <!-- Restart button -->
    <div id="restart-area" class="hidden">
      <button id="restart-btn">Iniciar nueva conversacion</button>
    </div>

    <!-- Data saved indicator -->
    <div id="data-saved" class="hidden">
      <span>&#10003; Datos guardados</span>
    </div>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
